<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CREADOR DE DNI - LeidersRP</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
.container{background:#1c1c1c;padding:30px;border-radius:15px;width:400px;text-align:center;color:white;}
input{width:90%;padding:10px;margin:8px;border-radius:8px;border:none;}
button{padding:10px 20px;border:none;border-radius:8px;background:#00c3ff;font-weight:bold;cursor:pointer;}
textarea{width:90%;height:100px;margin-top:10px;border-radius:8px;border:none;padding:10px;}
</style>
</head>
<body>

<div class="container">
<h2>CREADOR DE DNI</h2>

<input type="text" id="psid" placeholder="ID PlayStation">
<input type="text" id="nombre" placeholder="Nombre y Apellidos">
<input type="text" id="sexo" placeholder="Sexo">
<input type="text" id="nacionalidad" placeholder="Nacionalidad">
<button onclick="crearDNI()">Generar JSON</button>

<h3>JSON listo para agregar a dni.json:</h3>
<textarea id="jsonOutput" readonly></textarea>
</div>

<script>
function crearDNI(){
    const datos = {
        psid: document.getElementById("psid").value,
        nombre: document.getElementById("nombre").value,
        sexo: document.getElementById("sexo").value,
        nacionalidad: document.getElementById("nacionalidad").value,
        busca: "No",
        multas: "0"
    };

    // Genera JSON listo para copiar y pegar
    const json = JSON.stringify(datos, null, 4);
    document.getElementById("jsonOutput").value = json;

    alert("JSON generado. Copia y pégalo en dni.json");
}
</script>

</body>
</html>
